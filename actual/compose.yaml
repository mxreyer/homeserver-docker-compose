services:

  tailscale:
    image: tailscale/tailscale:latest
    environment:
      - TS_HOSTNAME=${CONF_HOSTNAME}
      - TS_AUTH_KEY=${CONF_TS_KEY}
      - TS_EXTRA_ARGS=--advertise-tags=tag:${CONF_TS_TAG}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - ../../docker-binds/actual/tailscale/state:/var/lib/tailscale
      - ./tailscale/config:/config # for the serve.json config file
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    networks:
      - net
    healthcheck:
      test: tailscale status --peers=false --json | grep 'Online.*true'
      start_period: 3s
      interval: 1s
      retries: 3
    restart: unless-stopped

  actual:
    image: docker.io/actualbudget/actual-server:latest
    volumes:
      - ../../docker-binds/actual/data:/data
    #environment:
    #  # Uncomment any of the lines below to set configuration options.
    #  # - ACTUAL_HTTPS_KEY=/data/selfhost.key
    #  # - ACTUAL_HTTPS_CERT=/data/selfhost.crt
    #  # - ACTUAL_PORT=5006
    #  # - ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB=20
    #  # - ACTUAL_UPLOAD_SYNC_ENCRYPTED_FILE_SYNC_SIZE_LIMIT_MB=50
    #  # - ACTUAL_UPLOAD_FILE_SIZE_LIMIT_MB=20
    #  # See all options and more details at https://actualbudget.org/docs/config/
    #  # !! If you are not using any of these options, remove the 'environment:' tag entirely.
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'node src/scripts/health-check.js']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

networks:
  net:
