services:

  tailscale:
    image: tailscale/tailscale:latest
    environment:
      - TS_HOSTNAME=${CONF_HOSTNAME}
      - TS_AUTH_KEY=${CONF_TS_KEY}
      - TS_EXTRA_ARGS=--advertise-tags=tag:${CONF_TS_TAG}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - ../../docker-binds/ollama/tailscale/state:/var/lib/tailscale
      - ./tailscale/config:/config # for the serve.json config file
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    networks:
      - net
    healthcheck:
      test: tailscale status --peers=false --json | grep 'Online.*true'
      start_period: 3s
      interval: 1s
      retries: 3
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
      - ../../docker-binds/ollama/modelfiles:/modelfiles
    networks:
      - net
    depends_on:
      tailscale:
        condition: service_healthy
    restart: unless-stopped

  ollama-webui:
    image: ghcr.io/ollama-webui/ollama-webui:main
    volumes:
      - ollama_webui_data:/app/backend/data
    environment:
      - OLLAMA_API_BASE_URL=http://ollama:11434/api
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

volumes:
  tailscale:
  modelfiles:
  ollama_data:
  ollama_webui_data:

networks:
  net:
