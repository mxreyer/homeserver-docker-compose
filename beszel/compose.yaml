services:

  tailscale:
    image: tailscale/tailscale:latest
    environment:
      - TS_HOSTNAME=${CONF_HOSTNAME}
      - TS_AUTH_KEY=${CONF_TS_KEY}
      - TS_EXTRA_ARGS=--advertise-tags=tag:${CONF_TS_TAG}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - ../../docker-binds/beszel/tailscale/state:/var/lib/tailscale
      - ./tailscale/config:/config # for the serve.json config file
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    networks:
      - net
    healthcheck:
      test: tailscale status --peers=false --json | grep 'Online.*true'
      start_period: 3s
      interval: 1s
      retries: 3
    restart: unless-stopped

  beszel:
    image: henrygd/beszel:latest
    volumes:
      - ../../docker-binds/beszel/beszel_data:/beszel_data
      - ../../docker-binds/beszel/beszel_socket:/beszel_socket
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
    restart: unless-stopped

  beszel-agent:
    image: henrygd/beszel-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../docker-binds/beszel/beszel_agent_data:/var/lib/beszel-agent
      - ../../docker-binds/beszel/beszel_socket:/beszel_socket
    environment:
      LISTEN: /beszel_socket/beszel.sock
      KEY: ${CONF_LOCAL_AGENT_KEY}
      TOKEN: ${CONF_LOCAL_AGENT_TOKEN} 
      HUB_URL: https://${CONF_DOMAIN} 
    network_mode: host # may be commented out if host network stats are not required
    restart: unless-stopped

networks:
  net:
